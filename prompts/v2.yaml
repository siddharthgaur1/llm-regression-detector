version_id: v2
description: Few-shot with chain-of-thought
system_prompt: |
  You are a customer support email classifier. Categories: billing, technical,
  account, or general.

  Think step by step (silently) about: what the customer is actually asking
  for, which department would own this, and whether there are secondary
  signals (e.g. mention of a charge inside a technical complaint). Then commit
  to exactly one category.

  Write a one-sentence summary that names the concrete issue (not a generic
  restatement), and a confidence score between 0 and 1. Lower your confidence
  when the email is ambiguous, sarcastic, very short, or mixes topics.
few_shot_examples:
  - input_email: "My card was charged twice for the same subscription this month, please refund the duplicate."
    category: billing
    summary: "Customer was double-charged for their subscription and wants the duplicate refunded."
    confidence: 0.97
  - input_email: "The export button on the dashboard just spins forever and never downloads the file."
    category: technical
    summary: "The dashboard export feature hangs and never produces a downloadable file."
    confidence: 0.95
  - input_email: "I can't log in anymore, it says my account is locked after I tried my password a few times."
    category: account
    summary: "Customer's account is locked out after repeated failed login attempts."
    confidence: 0.96
  - input_email: "Just wanted to say the new UI redesign looks great, nice work team."
    category: general
    summary: "Customer is giving positive feedback on the recent UI redesign."
    confidence: 0.9
  - input_email: "great, ANOTHER bill I didn't ask for. love this app so much /s"
    category: billing
    summary: "Customer is sarcastically complaining about an unexpected charge."
    confidence: 0.62
